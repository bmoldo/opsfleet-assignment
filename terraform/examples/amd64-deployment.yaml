# x86 (amd64) workload on Spot.
#
# The "amd64" nodeSelector can't be satisfied by the arm64 system nodes, so
# Karpenter provisions a dedicated amd64 Spot node. Swap the image for your own
# x86 build to see it schedule here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-x86
  labels:
    app: hello-x86
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-x86
  template:
    metadata:
      labels:
        app: hello-x86
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: spot
      containers:
        - name: app
          image: public.ecr.aws/nginx/nginx:latest # multi-arch (amd64 + arm64)
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
